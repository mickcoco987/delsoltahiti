name: Mise a jour de la cote 458

# Lance le scraper chaque jour, puis publie les donnees actualisees.
on:
  schedule:
    - cron: "17 6 * * *"   # tous les jours a 06h17 UTC
  workflow_dispatch:        # declenchement manuel possible

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scraper la cote (classic.com + Bring a Trailer + Marketcheck)
        env:
          # Cle API Marketcheck. A definir dans :
          # Settings > Secrets and variables > Actions > New repository secret.
          # Absente = la source Marketcheck est simplement ignoree.
          MARKETCHECK_API_KEY: ${{ secrets.MARKETCHECK_API_KEY }}
        run: |
          # --replace : chaque run = instantane reel du jour (purge l'echantillon).
          # Si toutes les sources echouent, le scraper s'arrete avant l'ecriture
          # (exit 1) et les donnees existantes sont conservees.
          python -m scraper --source all --replace --verbose \
            || echo "Sources live indisponibles — donnees existantes conservees."

      - name: Publier les donnees actualisees
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore: mise a jour automatique de la cote 458"
            git push
          else
            echo "Aucun changement de cote a publier."
          fi
