name: Mise a jour de la cote supercars

# Lance le scraper chaque jour pour tous les modeles du catalogue,
# puis publie les donnees actualisees.
on:
  schedule:
    - cron: "17 6 * * *"   # tous les jours a 06h17 UTC
  workflow_dispatch:        # declenchement manuel possible

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scraper la cote pour tous les modeles
        env:
          # Cles d'API a definir dans :
          # Settings > Secrets and variables > Actions > New repository secret.
          # Une cle absente = sa source est simplement ignoree.
          MARKETCHECK_API_KEY: ${{ secrets.MARKETCHECK_API_KEY }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: |
          # --model all : boucle sur tous les modeles du catalogue.
          # --replace : chaque run = instantane reel du jour.
          # Si toutes les sources echouent pour un modele, ses donnees existantes
          # sont conservees.
          python -m scraper --model all --source all --replace --verbose \
            || echo "Sources live partiellement indisponibles — donnees existantes conservees pour les modeles concernes."

      - name: Publier les donnees actualisees
        run: |
          if [ -n "$(git status --porcelain data/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "chore: mise a jour automatique de la cote supercars"
            git push
          else
            echo "Aucun changement de cote a publier."
          fi
