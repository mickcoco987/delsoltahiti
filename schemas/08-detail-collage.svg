<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" font-family="-apple-system, Helvetica Neue, Arial, sans-serif">
<rect width="720" height="380" fill="#fdfaf3"/>
<defs>
<marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0,0 8,4 0,8" fill="#333"/></marker>
<marker id="arrR" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto"><polygon points="8,0 0,4 8,8" fill="#333"/></marker>
<pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#a87a4e" stroke-width="0.8"/></pattern>
<pattern id="hatchL" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="5" stroke="#c79e63" stroke-width="0.6"/></pattern>
</defs>
<text x="360.0" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Détail — Collage chant-à-chant des 1×8 (plan de travail Lit 2)</text>
<rect x="-192.0" y="181.0" width="368.0" height="38.0" fill="#c79e63" stroke="#3a2a18" stroke-width="1"/>
<rect x="176.0" y="181.0" width="368.0" height="38.0" fill="#c79e63" stroke="#3a2a18" stroke-width="1"/>
<rect x="544.0" y="181.0" width="368.0" height="38.0" fill="#c79e63" stroke="#3a2a18" stroke-width="1"/>
<line x1="176.0" y1="181.0" x2="176.0" y2="219.0" stroke="#a85020" stroke-width="2.5"/>
<line x1="544.0" y1="181.0" x2="544.0" y2="219.0" stroke="#a85020" stroke-width="2.5"/>
<line x1="-192.0" y1="249.0" x2="912.0" y2="249.0" stroke="#333" stroke-width="0.6" marker-start="url(#arrR)" marker-end="url(#arr)"/>
<line x1="-192.0" y1="245.0" x2="-192.0" y2="253.0" stroke="#333" stroke-width="0.6"/>
<line x1="912.0" y1="245.0" x2="912.0" y2="253.0" stroke="#333" stroke-width="0.6"/>
<text x="360.0" y="245.0" text-anchor="middle" font-size="9" fill="#333">552 mm brut → raboter à 500 mm</text>
<line x1="-192.0" y1="269.0" x2="176.0" y2="269.0" stroke="#333" stroke-width="0.6" marker-start="url(#arrR)" marker-end="url(#arr)"/>
<line x1="-192.0" y1="265.0" x2="-192.0" y2="273.0" stroke="#333" stroke-width="0.6"/>
<line x1="176.0" y1="265.0" x2="176.0" y2="273.0" stroke="#333" stroke-width="0.6"/>
<text x="-8.0" y="266.0" text-anchor="middle" font-size="9" fill="#333">184 (1×8)</text>
<line x1="-212.0" y1="181.0" x2="-212.0" y2="219.0" stroke="#333" stroke-width="0.6" marker-start="url(#arrR)" marker-end="url(#arr)"/>
<line x1="-216.0" y1="181.0" x2="-208.0" y2="181.0" stroke="#333" stroke-width="0.6"/>
<line x1="-216.0" y1="219.0" x2="-208.0" y2="219.0" stroke="#333" stroke-width="0.6"/>
<text x="-216.0" y="203.0" text-anchor="end" font-size="9" fill="#333">19</text>
<text x="360.0" y="81.0" text-anchor="middle" font-size="11" fill="#222" font-weight="bold">Vue en bout : 3 lames 1×8 jointées chant-à-chant</text>
<text x="360.0" y="97.0" text-anchor="middle" font-size="9" fill="#666" font-weight="normal">(les lames vont vers le fond, longueur 1900 mm)</text>
<text x="540" y="110" font-size="10" font-weight="bold" fill="#222">Détail joint avec cheville Ø8 :</text>
<rect x="540" y="130" width="60" height="30" fill="#c79e63" stroke="#3a2a18" stroke-width="0.8"/>
<rect x="600" y="130" width="60" height="30" fill="#c79e63" stroke="#3a2a18" stroke-width="0.8"/>
<line x1="600" y1="130" x2="600" y2="160" stroke="#a85020" stroke-width="2"/>
<rect x="582" y="141" width="36" height="8" fill="#8b5a30" stroke="#3a2a18" stroke-width="0.5"/>
<text x="600" y="180" text-anchor="middle" font-size="9" fill="#5a3a1a" font-weight="normal">cheville bois Ø8 × 30</text>
<text x="600" y="194" text-anchor="middle" font-size="8" fill="#666" font-weight="normal">(perçage Ø8 prof. 18 mm × 2)</text>
<text x="40" y="320" text-anchor="start" font-size="9" fill="#333" font-weight="normal">1. Tracer 3 chevilles par joint, à 30 cm des bouts et au milieu, à mi-épaisseur (axe Z=9,5 mm).</text>
<text x="40" y="334" text-anchor="start" font-size="9" fill="#333" font-weight="normal">2. Percer Ø8 prof. 18 mm aux 6 points par joint (3 × 2 faces).</text>
<text x="40" y="348" text-anchor="start" font-size="9" fill="#333" font-weight="normal">3. Encoller chants + chevilles, presser aux serre-joints 4 h. Raboter ensuite la largeur finale à 500 mm.</text>
</svg>