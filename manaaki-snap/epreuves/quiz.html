<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Le Quiz des Lenses</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <div id="bandeau-equipe" class="bandeau-equipe" style="display:none;"></div>

  <div class="container">

    <h1>📸 Le Quiz des Lenses</h1>
    <p class="subtitle">Épreuve 4 sur 5</p>

    <div id="zone-jeu">

      <div class="parchment">
        <p>Le Ghoster te défie sur ta culture photo et emoji.
        Pour récupérer cette Memory, tu dois <strong>répondre à 5 questions</strong>.</p>
        <p class="indice">💡 Lis bien la question... puis choisis la bonne réponse !</p>
      </div>

      <div id="progres-quiz" style="text-align:center;font-weight:700;color:#1A1A1A;font-size:1.1rem;margin-bottom:1rem;"></div>

      <div id="zone-question"></div>

    </div>

    <div id="zone-victoire"></div>

  </div>

  <script src="../config.js"></script>
  <script src="../app.js"></script>
  <script>
    const QUESTIONS = [
      {
        description: "Quel emoji veut dire « mort de rire » ?",
        choix: [
          { emoji: "😂", nom: "Larmes de joie",  correct: true  },
          { emoji: "🙃", nom: "Tête à l'envers", correct: false },
          { emoji: "😴", nom: "Endormi",         correct: false },
          { emoji: "😤", nom: "Fumée du nez",    correct: false }
        ]
      },
      {
        description: "Quel filtre te transforme en chiot avec les oreilles et la langue qui pendouille ?",
        choix: [
          { emoji: "🐱", nom: "Filtre Chat",     correct: false },
          { emoji: "🐶", nom: "Filtre Chien",    correct: true  },
          { emoji: "🐰", nom: "Filtre Lapin",    correct: false },
          { emoji: "🦊", nom: "Filtre Renard",   correct: false }
        ]
      },
      {
        description: "De quelle couleur est la mascotte fantôme de ce jeu ?",
        choix: [
          { emoji: "🟣", nom: "Violette",  correct: false },
          { emoji: "🔵", nom: "Bleue",     correct: false },
          { emoji: "🟡", nom: "Jaune",     correct: true  },
          { emoji: "🟢", nom: "Verte",     correct: false }
        ]
      },
      {
        description: "Combien de couleurs principales y a-t-il dans un arc-en-ciel ?",
        choix: [
          { emoji: "5️⃣", nom: "5 couleurs", correct: false },
          { emoji: "6️⃣", nom: "6 couleurs", correct: false },
          { emoji: "7️⃣", nom: "7 couleurs", correct: true  },
          { emoji: "8️⃣", nom: "8 couleurs", correct: false }
        ]
      },
      {
        description: "Que veut dire « LOL » dans un message ?",
        choix: [
          { emoji: "💤", nom: "Je dors",            correct: false },
          { emoji: "😂", nom: "Je ris très fort",   correct: true  },
          { emoji: "🍕", nom: "J'ai faim",          correct: false },
          { emoji: "👋", nom: "Bonjour",            correct: false }
        ]
      }
    ];

    let questionActuelle = 0;
    let erreurs = 0;

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function render() {
      document.getElementById('progres-quiz').textContent =
        `Question ${questionActuelle + 1} / ${QUESTIONS.length}`;

      const q = QUESTIONS[questionActuelle];
      const choixMelanges = shuffle(q.choix);

      document.getElementById('zone-question').innerHTML = `
        <div class="parchment">
          <p style="font-size:1.05rem;">${q.description}</p>
        </div>
        <div class="grille" id="choix">
          ${choixMelanges.map((c, i) => `
            <div class="case" onclick="repondre(${q.choix.indexOf(c)}, this)" style="font-size:1rem;">
              <div style="font-size:2.5rem;">${c.emoji}</div>
              <div style="margin-top:0.3rem;">${c.nom}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function repondre(idxOriginal, elt) {
      const q = QUESTIONS[questionActuelle];
      const correct = q.choix[idxOriginal].correct;

      document.querySelectorAll('#choix .case').forEach(c => c.style.pointerEvents = 'none');

      if (correct) {
        elt.classList.add('correct');
        setTimeout(() => {
          questionActuelle++;
          if (questionActuelle >= QUESTIONS.length) {
            gagne();
          } else {
            render();
          }
        }, 900);
      } else {
        elt.classList.add('wrong');
        erreurs++;
        if (navigator.vibrate) navigator.vibrate(150);
        setTimeout(() => {
          render();
        }, 1000);
      }
    }

    function gagne() {
      MM.marquerGagnee('quiz');
      document.getElementById('zone-jeu').classList.add('hidden');
      MM.afficherMotGagne('quiz', 'zone-victoire');
    }

    render();

    if (MM.getEtat().epreuvesGagnees['quiz']) {
      document.getElementById('zone-jeu').classList.add('hidden');
      MM.afficherMotGagne('quiz', 'zone-victoire');
    }
  </script>

</body>
</html>
