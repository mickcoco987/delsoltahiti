<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Les Hashtags Brisés</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <div id="bandeau-equipe" class="bandeau-equipe" style="display:none;"></div>

  <div class="container">

    <h1>#️⃣ Les Hashtags Brisés</h1>
    <p class="subtitle">Épreuve 3 sur 5</p>

    <div id="zone-jeu">

      <div class="parchment">
        <p>Trois hashtags ont été <strong>cassés en lettres</strong> par
        Le Ghoster. Reconstitue-les pour récupérer cette Memory.</p>
        <p class="indice">💡 Touche les lettres dans le bon ordre pour former le mot. Touche une lettre placée pour la retirer. <strong>Indice :</strong> ce sont 3 mots du monde de la photo !</p>
      </div>

      <div id="liste-mots"></div>

      <div id="message" style="text-align:center;font-weight:bold;min-height:1.5em;"></div>

    </div>

    <div id="zone-victoire"></div>

  </div>

  <script src="../config.js"></script>
  <script src="../app.js"></script>
  <script>
    const MOTS = [
      { mot: "SELFIE",  indice: "Photo que tu prends de toi-même" },
      { mot: "EMOJI",   indice: "Petite image souriante 🙂 dans un texte" },
      { mot: "FANTOME", indice: "La mascotte jaune du jeu — 👻 !" }
    ];

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const etatMots = MOTS.map(m => {
      const lettresSource = m.mot.split('');
      let melange;
      do {
        melange = shuffle(lettresSource);
      } while (melange.join('') === m.mot && lettresSource.length > 1);
      return {
        mot: m.mot,
        indice: m.indice,
        disponibles: melange.map((l, i) => ({ lettre: l, id: i })),
        choisies: [],
        resolu: false
      };
    });

    function render() {
      const conteneur = document.getElementById('liste-mots');
      conteneur.innerHTML = etatMots.map((m, i) => `
        <div class="parchment" data-mot="${i}">
          <h3>Hashtag #${i+1} : <span style="font-weight:normal;font-style:italic;color:#555;">${m.indice}</span></h3>

          <div style="display:flex;justify-content:center;gap:0.4rem;margin:1rem 0;flex-wrap:wrap;">
            ${Array.from({length: m.mot.length}).map((_, slotIdx) => {
              const id = m.choisies[slotIdx];
              const lettre = id !== undefined ? m.disponibles.find(d => d.id === id).lettre : '';
              return `<div onclick="retirerLettre(${i}, ${slotIdx})"
                           style="width:42px;height:42px;border:2px solid #1A1A1A;border-radius:8px;
                                  background:${lettre ? '#FFFC00' : '#FAFAFA'};
                                  display:flex;align-items:center;justify-content:center;
                                  font-size:1.4rem;font-weight:bold;
                                  color:#1A1A1A;cursor:${lettre ? 'pointer' : 'default'};">
                        ${lettre || '_'}
                      </div>`;
            }).join('')}
          </div>

          <p class="center" style="font-size:0.9rem;color:#555;">Lettres disponibles :</p>

          <div style="display:flex;justify-content:center;gap:0.4rem;flex-wrap:wrap;">
            ${m.disponibles.map(d => {
              const utilisee = m.choisies.includes(d.id);
              return `<div onclick="ajouterLettre(${i}, ${d.id})"
                           style="width:42px;height:42px;border:2px solid ${utilisee ? '#E0E0E0' : '#1A1A1A'};border-radius:8px;
                                  background:${utilisee ? '#F0F0F0' : '#fff'};
                                  display:flex;align-items:center;justify-content:center;
                                  font-size:1.4rem;font-weight:bold;
                                  color:${utilisee ? '#999' : '#1A1A1A'};
                                  opacity:${utilisee ? '0.3' : '1'};
                                  cursor:${utilisee ? 'default' : 'pointer'};">
                        ${d.lettre}
                      </div>`;
            }).join('')}
          </div>

          ${m.resolu ? '<p class="center mt-2" style="color:#2e7d32;font-weight:bold;font-size:1.1rem;">✓ Hashtag reconstitué !</p>' : ''}
        </div>
      `).join('');
    }

    function ajouterLettre(motIdx, lettreId) {
      const m = etatMots[motIdx];
      if (m.resolu) return;
      if (m.choisies.includes(lettreId)) return;
      if (m.choisies.length >= m.mot.length) return;
      m.choisies.push(lettreId);

      if (m.choisies.length === m.mot.length) {
        const motActuel = m.choisies.map(id => m.disponibles.find(d => d.id === id).lettre).join('');
        if (motActuel === m.mot) {
          m.resolu = true;
          afficherMessage("✓ Hashtag " + (motIdx+1) + " reconstitué !", true);
          checkVictoire();
        } else {
          afficherMessage("❌ Ce hashtag ne fonctionne pas... Réessaie !", false);
          if (navigator.vibrate) navigator.vibrate(150);
        }
      } else {
        afficherMessage("", true);
      }
      render();
    }

    function retirerLettre(motIdx, slotIdx) {
      const m = etatMots[motIdx];
      if (m.resolu) return;
      if (slotIdx < m.choisies.length) {
        m.choisies.splice(slotIdx, 1);
        afficherMessage("", true);
        render();
      }
    }

    function afficherMessage(txt, ok) {
      const el = document.getElementById('message');
      el.textContent = txt;
      el.style.color = ok ? '#2e7d32' : '#c62828';
    }

    function checkVictoire() {
      if (etatMots.every(m => m.resolu)) {
        setTimeout(() => {
          MM.marquerGagnee('hashtags');
          document.getElementById('zone-jeu').classList.add('hidden');
          MM.afficherMotGagne('hashtags', 'zone-victoire');
        }, 800);
      }
    }

    render();

    if (MM.getEtat().epreuvesGagnees['hashtags']) {
      document.getElementById('zone-jeu').classList.add('hidden');
      MM.afficherMotGagne('hashtags', 'zone-victoire');
    }
  </script>

</body>
</html>
